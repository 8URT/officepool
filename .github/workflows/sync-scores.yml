name: Sync match scores

on:
  # Scores sync on the droplet cron — manual only here for debugging.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync scores from API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 scripts/sync-scores.py

      - name: Show result
        run: |
          python3 -c "import json; d=json.load(open('data/scores.json')); print('updatedAt:', d.get('updatedAt'), 'matches:', len(d.get('matches',[])))"
