name: Deploy to droplet

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and deploy on droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          if [[ -z "${SSH_KEY}" ]]; then
            echo "DROPLET_SSH_KEY secret is not set."
            echo "Run on your Mac: bash scripts/setup-github-actions-ssh.sh"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "DROPLET_SSH_KEY is invalid. Re-copy the private key from:"
            echo "  bash scripts/setup-github-actions-ssh.sh"
            exit 1
          fi
          HOST="${DROPLET_HOST:-146.190.102.191}"
          USER="${DROPLET_USER:-root}"
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o ConnectTimeout=30 "${USER}@${HOST}" \
            "cd /opt/officepool && bash scripts/pull-deploy-droplet.sh"
